<!-- @dsCard group="Colors" viewport="700x150" name="Pine — primary" subtitle="Eucalyptus green. Primary actions, links, brand." -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--surface-card);font-family:var(--font-sans);}
  .scale{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-xs);}
  .sw{flex:1;height:84px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;}
  .sw span{font-family:var(--font-mono);font-size:10px;}
  .cap{margin-top:8px;font-size:12px;color:var(--text-muted);}
  .cap b{color:var(--text-strong);font-weight:600;}
</style></head>
<body>
<div class="scale">
  <div class="sw" style="background:var(--pine-50)"><span style="color:var(--pine-700)">50</span></div>
  <div class="sw" style="background:var(--pine-100)"><span style="color:var(--pine-700)">100</span></div>
  <div class="sw" style="background:var(--pine-200)"><span style="color:var(--pine-800)">200</span></div>
  <div class="sw" style="background:var(--pine-300)"><span style="color:var(--pine-900)">300</span></div>
  <div class="sw" style="background:var(--pine-400)"><span style="color:#fff">400</span></div>
  <div class="sw" style="background:var(--pine-500)"><span style="color:#fff">500</span></div>
  <div class="sw" style="background:var(--pine-600)"><span style="color:#fff">600·base</span></div>
  <div class="sw" style="background:var(--pine-700)"><span style="color:#fff">700</span></div>
  <div class="sw" style="background:var(--pine-800)"><span style="color:#fff">800</span></div>
  <div class="sw" style="background:var(--pine-900)"><span style="color:#fff">900</span></div>
</div>
<div class="cap"><b>--color-primary = pine-600 (#2A5E4A).</b> Calm, grounded growth. The brand's anchor — primary buttons, links, active states.</div>
</body></html>

<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:0;background:var(--surface-page);font-family:var(--font-sans);}
  .hero{padding:26px 28px;background:linear-gradient(160deg,var(--pine-700),var(--pine-800));color:#fff;}
  .eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ochre-200);margin-bottom:8px;}
  .h{font-family:var(--font-display);font-weight:600;font-size:30px;line-height:1.08;letter-spacing:-.02em;max-width:520px;}
  .h em{font-style:italic;color:var(--ochre-200);font-weight:500;}
  .sub{margin-top:10px;font-size:14px;color:rgba(255,255,255,.78);max-width:460px;}
  .cta{margin-top:16px;display:inline-flex;gap:.5em;align-items:center;background:var(--clay-500);color:#fff;font-weight:600;font-size:14px;padding:.6em 1.2em;border-radius:var(--radius-pill);}
</style></head>
<body>
<div class="hero">
  <div class="eyebrow">A Novare Co. learning platform</div>
  <div class="h">Confident, calm guidance for <em>AI in Catholic education</em>.</div>
  <div class="sub">We meet teachers where they are — practical, plain-spoken, never hyped. Discovery feels like browsing, with a clear path to go deeper.</div>
  <span class="cta">Explore AI tools →</span>
</div>
</body></html>

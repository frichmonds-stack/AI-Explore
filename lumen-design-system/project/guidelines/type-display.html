<!-- @dsCard group="Type" viewport="700x200" name="Display — Newsreader" subtitle="Editorial serif for headlines & hero" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--surface-card);}
  .eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;}
  .h1{font-family:var(--font-display);font-weight:600;font-size:52px;line-height:1.05;letter-spacing:-.02em;color:var(--text-strong);}
  .h1 em{font-style:italic;color:var(--pine-600);font-weight:500;}
  .meta{margin-top:14px;font-family:var(--font-mono);font-size:11px;color:var(--text-faint);display:flex;gap:18px;}
</style></head>
<body>
<div class="eyebrow">Display · Newsreader</div>
<div class="h1">Bringing <em>light</em> to AI in the classroom.</div>
<div class="meta"><span>Newsreader</span><span>400 / 500 / 600</span><span>italic for emphasis</span><span>tracking −0.02em</span></div>
</body></html>

<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--surface-page);font-family:var(--font-mono);}
  .grid{display:flex;flex-direction:column;gap:14px;}
  .eyebrow{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);}
  .row{display:flex;gap:12px;align-items:center;}
  .chip{font-size:11px;letter-spacing:.04em;color:var(--pine-700);background:var(--pine-50);padding:.35em .6em;border-radius:6px;}
  .meta{font-size:11px;color:var(--text-faint);letter-spacing:.04em;}
</style></head>
<body>
<div class="grid">
  <div class="eyebrow">AI Tools Directory</div>
  <div class="row">
    <span class="chip">LESSON PLANNING</span>
    <span class="chip">ASSESSMENT</span>
    <span class="chip">YEAR 7–9</span>
  </div>
  <div class="meta">Updated 14 June 2026 · 142 tools · reviewed quarterly</div>
</div>
<div style="margin-top:18px;font-family:var(--font-sans);font-size:12px;color:var(--text-muted)">IBM Plex Mono, uppercased with <b style="color:var(--text-strong)">0.12em</b> tracking for eyebrows; sentence case for metadata.</div>
</body></html>

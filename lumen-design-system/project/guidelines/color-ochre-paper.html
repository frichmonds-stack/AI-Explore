<!-- @dsCard group="Colors" viewport="700x160" name="Ochre & Paper" subtitle="Gold highlight + warm paper neutrals" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--surface-card);font-family:var(--font-sans);}
  .row{display:flex;gap:18px;}
  .grp{flex:1;}
  .ttl{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;}
  .scale{display:flex;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-xs);border:1px solid var(--border-subtle);}
  .sw{flex:1;height:62px;display:flex;align-items:flex-end;padding:6px;}
  .sw span{font-family:var(--font-mono);font-size:9px;}
</style></head>
<body>
<div class="row">
  <div class="grp">
    <div class="ttl">Ochre — highlight</div>
    <div class="scale">
      <div class="sw" style="background:var(--ochre-100)"><span style="color:var(--ochre-600)">100</span></div>
      <div class="sw" style="background:var(--ochre-200)"><span style="color:var(--ochre-600)">200</span></div>
      <div class="sw" style="background:var(--ochre-300)"><span style="color:#fff">300</span></div>
      <div class="sw" style="background:var(--ochre-400)"><span style="color:#fff">400</span></div>
      <div class="sw" style="background:var(--ochre-500)"><span style="color:#fff">500</span></div>
      <div class="sw" style="background:var(--ochre-600)"><span style="color:#fff">600</span></div>
    </div>
  </div>
  <div class="grp">
    <div class="ttl">Paper — warm neutrals</div>
    <div class="scale">
      <div class="sw" style="background:var(--paper-50)"><span style="color:var(--ink-600)">50·page</span></div>
      <div class="sw" style="background:var(--paper-100)"><span style="color:var(--ink-600)">100</span></div>
      <div class="sw" style="background:var(--paper-200)"><span style="color:var(--ink-600)">200</span></div>
      <div class="sw" style="background:var(--paper-300)"><span style="color:var(--ink-600)">300</span></div>
      <div class="sw" style="background:var(--paper-400)"><span style="color:var(--ink-700)">400</span></div>
    </div>
  </div>
</div>
<div style="margin-top:10px;font-size:12px;color:var(--text-muted)">Ochre is a <b style="color:var(--text-strong)">spark</b>, used in tiny doses (featured dots, awards). Paper is the calm canvas — page is <b style="color:var(--text-strong)">paper-50 #FBF8F2</b>, borders are paper-300.</div>
</body></html>

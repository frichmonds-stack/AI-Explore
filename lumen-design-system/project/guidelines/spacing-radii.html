<!-- @dsCard group="Spacing" viewport="700x150" name="Corner radii" subtitle="From 4px chips to 32px hero panels" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;background:var(--surface-card);font-family:var(--font-mono);}
  .row{display:flex;gap:16px;align-items:flex-end;}
  .item{text-align:center;}
  .box{width:74px;height:60px;background:var(--pine-50);border:1.5px solid var(--pine-300);}
  .lab{font-size:10px;color:var(--text-muted);margin-top:7px;}
  .lab b{color:var(--text-strong);display:block;font-weight:600;}
</style></head>
<body>
<div class="row">
  <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="lab"><b>sm</b>8px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="lab"><b>md</b>12px · inputs</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="lab"><b>lg</b>16px · cards</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="lab"><b>xl</b>24px · panels</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-2xl)"></div><div class="lab"><b>2xl</b>32px</div></div>
  <div class="item"><div class="box" style="width:60px;border-radius:var(--radius-pill)"></div><div class="lab"><b>pill</b>badges</div></div>
</div>
</body></html>

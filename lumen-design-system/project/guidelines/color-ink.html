<!-- @dsCard group="Colors" viewport="700x150" name="Ink — text on paper" subtitle="Warm near-black through muted captions" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;background:var(--surface-page);font-family:var(--font-sans);}
  .rows{display:flex;flex-direction:column;gap:2px;}
  .r{display:flex;align-items:baseline;gap:14px;}
  .r .txt{font-size:18px;font-weight:600;}
  .r .tok{font-family:var(--font-mono);font-size:11px;color:var(--text-faint);margin-left:auto;}
  .r .role{font-size:12px;color:var(--text-muted);width:120px;}
</style></head>
<body>
<div class="rows">
  <div class="r"><span class="txt" style="color:var(--ink-900)">The quick brown fox</span><span class="role">strong headings</span><span class="tok">--text-strong / ink-900</span></div>
  <div class="r"><span class="txt" style="color:var(--ink-700)">The quick brown fox</span><span class="role">body text</span><span class="tok">--text-body / ink-700</span></div>
  <div class="r"><span class="txt" style="color:var(--ink-500)">The quick brown fox</span><span class="role">muted / captions</span><span class="tok">--text-muted / ink-500</span></div>
  <div class="r"><span class="txt" style="color:var(--ink-400)">The quick brown fox</span><span class="role">faint / placeholder</span><span class="tok">--text-faint / ink-400</span></div>
</div>
</body></html>

<!-- @dsCard group="Colors" viewport="700x150" name="Clay — accent" subtitle="Warm terracotta. Approachable emphasis & warmth." -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--surface-card);font-family:var(--font-sans);}
  .scale{display:flex;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-xs);}
  .sw{flex:1;height:84px;display:flex;align-items:flex-end;padding:8px;}
  .sw span{font-family:var(--font-mono);font-size:10px;}
  .cap{margin-top:8px;font-size:12px;color:var(--text-muted);}
  .cap b{color:var(--text-strong);font-weight:600;}
</style></head>
<body>
<div class="scale">
  <div class="sw" style="background:var(--clay-50)"><span style="color:var(--clay-700)">50</span></div>
  <div class="sw" style="background:var(--clay-100)"><span style="color:var(--clay-700)">100</span></div>
  <div class="sw" style="background:var(--clay-200)"><span style="color:var(--clay-800)">200</span></div>
  <div class="sw" style="background:var(--clay-300)"><span style="color:var(--clay-900)">300</span></div>
  <div class="sw" style="background:var(--clay-400)"><span style="color:#fff">400</span></div>
  <div class="sw" style="background:var(--clay-500)"><span style="color:#fff">500·base</span></div>
  <div class="sw" style="background:var(--clay-600)"><span style="color:#fff">600</span></div>
  <div class="sw" style="background:var(--clay-700)"><span style="color:#fff">700</span></div>
  <div class="sw" style="background:var(--clay-800)"><span style="color:#fff">800</span></div>
  <div class="sw" style="background:var(--clay-900)"><span style="color:#fff">900</span></div>
</div>
<div class="cap"><b>--color-accent = clay-500 (#C25E3C).</b> Warm, human, inviting. Used sparingly for warm CTAs, featured highlights and discovery cues — never as a second primary.</div>
</body></html>

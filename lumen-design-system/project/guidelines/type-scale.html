<!-- @dsCard group="Type" viewport="700x300" name="Type scale" subtitle="11 → 60px modular ramp" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px 24px;background:var(--surface-card);}
  .r{display:flex;align-items:baseline;gap:16px;border-bottom:1px solid var(--border-subtle);padding:7px 0;}
  .r:last-child{border-bottom:none;}
  .r .s{font-family:var(--font-display);color:var(--text-strong);font-weight:600;line-height:1.05;white-space:nowrap;}
  .r .tok{font-family:var(--font-mono);font-size:11px;color:var(--text-faint);margin-left:auto;}
  .r .px{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);width:46px;text-align:right;}
</style></head>
<body>
  <div class="r"><span class="s" style="font-size:60px">Lumen</span><span class="px">60</span><span class="tok">--text-4xl</span></div>
  <div class="r"><span class="s" style="font-size:46px">Display</span><span class="px">46</span><span class="tok">--text-3xl</span></div>
  <div class="r"><span class="s" style="font-size:36px">Heading</span><span class="px">36</span><span class="tok">--text-2xl</span></div>
  <div class="r"><span class="s" style="font-size:28px">Subhead</span><span class="px">28</span><span class="tok">--text-xl</span></div>
  <div class="r"><span class="s" style="font-size:22px">Title</span><span class="px">22</span><span class="tok">--text-lg</span></div>
  <div class="r"><span class="s" style="font-size:18px;font-family:var(--font-sans)">Lead body</span><span class="px">18</span><span class="tok">--text-md</span></div>
  <div class="r"><span class="s" style="font-size:16px;font-family:var(--font-sans);font-weight:400">Body — base</span><span class="px">16</span><span class="tok">--text-base</span></div>
  <div class="r"><span class="s" style="font-size:14px;font-family:var(--font-sans);font-weight:400">Small / captions</span><span class="px">14</span><span class="tok">--text-sm</span></div>
  <div class="r"><span class="s" style="font-size:11px;font-family:var(--font-mono);letter-spacing:.1em">MICRO LABEL</span><span class="px">11</span><span class="tok">--text-2xs</span></div>
</body></html>

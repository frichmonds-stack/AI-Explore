<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing scale" subtitle="4px base grid" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;background:var(--surface-card);font-family:var(--font-mono);}
  .rows{display:flex;flex-direction:column;gap:7px;}
  .r{display:flex;align-items:center;gap:14px;}
  .bar{height:14px;background:var(--pine-300);border-radius:3px;}
  .tok{font-size:11px;color:var(--text-faint);width:90px;}
  .px{font-size:11px;color:var(--text-muted);width:38px;}
</style></head>
<body>
<div class="rows">
  <div class="r"><span class="tok">--space-1</span><span class="px">4</span><div class="bar" style="width:4px"></div></div>
  <div class="r"><span class="tok">--space-2</span><span class="px">8</span><div class="bar" style="width:8px"></div></div>
  <div class="r"><span class="tok">--space-3</span><span class="px">12</span><div class="bar" style="width:12px"></div></div>
  <div class="r"><span class="tok">--space-4</span><span class="px">16</span><div class="bar" style="width:16px"></div></div>
  <div class="r"><span class="tok">--space-5</span><span class="px">24</span><div class="bar" style="width:24px"></div></div>
  <div class="r"><span class="tok">--space-6</span><span class="px">32</span><div class="bar" style="width:32px"></div></div>
  <div class="r"><span class="tok">--space-7</span><span class="px">40</span><div class="bar" style="width:40px"></div></div>
  <div class="r"><span class="tok">--space-8</span><span class="px">48</span><div class="bar" style="width:48px"></div></div>
  <div class="r"><span class="tok">--space-9</span><span class="px">64</span><div class="bar" style="width:64px"></div></div>
</div>
</body></html>

<!-- @dsCard group="Spacing" viewport="700x170" name="Elevation — shadows" subtitle="Warm-tinted, never pure black" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:30px 22px;background:var(--surface-page);font-family:var(--font-mono);}
  .row{display:flex;gap:22px;align-items:center;}
  .item{text-align:center;}
  .box{width:96px;height:64px;background:var(--surface-card);border-radius:var(--radius-lg);}
  .lab{font-size:10px;color:var(--text-muted);margin-top:12px;}
  .lab b{color:var(--text-strong);display:block;font-weight:600;}
</style></head>
<body>
<div class="row">
  <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="lab"><b>xs</b></div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="lab"><b>sm</b> cards</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="lab"><b>md</b> hover</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="lab"><b>lg</b> lifted</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-xl)"></div><div class="lab"><b>xl</b> modals</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-pine)"></div><div class="lab"><b>pine</b> CTA lift</div></div>
</div>
</body></html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{ margin:0; padding:28px; background:var(--surface-page); }
  .lbl{ font-family:var(--font-mono); font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--text-muted); margin-bottom:12px; }
  .row{ display:flex; flex-wrap:wrap; gap:14px; align-items:center; margin-bottom:30px; }
  .grid{ display:grid; grid-template-columns:1fr 1fr; gap:18px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { ToolCard, StatusBadge } = window.LumenDesignSystem_e93e62;
function Demo(){
  return (
    <div>
      <div className="lbl">CEWA approval status (hover for tooltip)</div>
      <div className="row">
        <StatusBadge status="approved" />
        <StatusBadge status="pilot" />
        <StatusBadge status="review" />
        <StatusBadge status="restricted" />
        <StatusBadge status="unreviewed" />
      </div>

      <div className="lbl">Tool cards — featured &amp; standard</div>
      <div className="grid">
        <ToolCard
          name="MagicSchool AI"
          vendor="magicschool.ai"
          description="Generate lesson plans, rubrics and differentiated resources in minutes."
          status="approved"
          featured
          roles={['Classroom teacher','Curriculum lead']}
          tags={['Lesson planning','Differentiation','Rubrics']}
        />
        <ToolCard
          name="Brisk Teaching"
          vendor="briskteaching.com"
          description="A browser extension that gives feedback, levels texts and builds quizzes."
          status="pilot"
          popular
          roles={['Classroom teacher']}
          tags={['Feedback','Reading','Quizzes']}
        />
        <ToolCard
          name="Khanmigo"
          vendor="khanacademy.org"
          description="An AI tutor and teaching assistant grounded in Khan Academy content."
          status="review"
          roles={['Classroom teacher','Student-facing']}
          tags={['Tutoring','Maths']}
        />
        <ToolCard
          name="Character.AI"
          vendor="character.ai"
          description="Open-ended chatbot personas — not suitable for student-facing use."
          status="restricted"
          roles={['Staff only']}
          tags={['Chatbot']}
        />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>

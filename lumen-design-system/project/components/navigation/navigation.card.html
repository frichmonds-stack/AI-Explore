<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{ margin:0; padding:0 0 28px; background:var(--surface-page); }
  .pad{ padding:24px 28px; }
  .lbl{ font-family:var(--font-mono); font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--text-muted); margin:8px 0 14px; }
  .stack{ display:flex; flex-direction:column; gap:22px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Navbar, Tabs, Button, Avatar } = window.LumenDesignSystem_e93e62;
function Demo(){
  const [tab,setTab] = React.useState('all');
  const [view,setView] = React.useState('Featured');
  return (
    <div>
      <Navbar
        links={[{label:'Home',href:'#'},{label:'AI Tools',href:'#',active:true},{label:'Learning tracks',href:'#'},{label:'About',href:'#'}]}
        right={<><Button variant="ghost" size="sm">Sign in</Button><Avatar name="Jane Teacher" /></>}
      />
      <div className="pad stack">
        <div>
          <div className="lbl">Underline tabs</div>
          <Tabs value={tab} onChange={setTab} items={[{value:'all',label:'All tools',count:142},{value:'saved',label:'Saved',count:6},{value:'recent',label:'Recently added'}]} />
        </div>
        <div>
          <div className="lbl">Pill tabs</div>
          <Tabs variant="pill" value={view} onChange={setView} items={['Featured','Browse all','By subject']} />
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>

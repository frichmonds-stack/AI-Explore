<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{ margin:0; padding:28px; background:var(--surface-page); }
  .lbl{ font-family:var(--font-mono); font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--text-muted); margin-bottom:12px; }
  .stack{ display:flex; flex-direction:column; gap:12px; max-width:620px; margin-bottom:26px; }
  .row{ display:flex; gap:28px; align-items:center; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Alert, Tooltip, Button } = window.LumenDesignSystem_e93e62;
function Demo(){
  return (
    <div>
      <div className="lbl">Alerts</div>
      <div className="stack">
        <Alert tone="pine" title="New to AI in the classroom?">Start with the Foundations track — five short lessons.</Alert>
        <Alert tone="warning" title="Check before you share">This tool isn't approved for student-facing use yet.</Alert>
        <Alert tone="success" onClose={()=>{}}>Saved to your collection.</Alert>
      </div>
      <div className="lbl">Tooltips</div>
      <div className="row">
        <Tooltip content="Reviewed and approved for use in CEWA schools."><Button variant="secondary" size="sm">Hover me</Button></Tooltip>
        <Tooltip placement="bottom" content="Opens the full CEWA review notes."><Button variant="ghost" size="sm">Why this status?</Button></Tooltip>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>

<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap');
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1200px; height: 630px; }
body {
  background: #F6F1E7;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 96px;
  position: relative;
  overflow: hidden;
}
.eyebrow {
  font-family: 'IBM Plex Mono', monospace;
  font-weight: 500;
  font-size: 26px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #C25E3C;
  margin-bottom: 28px;
}
h1 {
  font-family: 'Newsreader', serif;
  font-optical-sizing: auto;
  font-weight: 500;
  font-size: 148px;
  line-height: 1.02;
  color: #20251F;
  letter-spacing: -0.01em;
  margin-bottom: 36px;
}
.tagline {
  font-family: 'Hanken Grotesk', sans-serif;
  font-weight: 400;
  font-size: 34px;
  line-height: 1.45;
  color: #3A4039;
  max-width: 860px;
}
.tagline strong { font-weight: 600; color: #2A5E4A; }
.rule {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 18px;
  background: #2A5E4A;
}
.rule::after {
  content: '';
  position: absolute;
  left: 0; bottom: 18px;
  width: 340px; height: 8px;
  background: #C25E3C;
}
</style>
</head>
<body>
  <div class="eyebrow">For teachers</div>
  <h1>Pigeon Hole</h1>
  <p class="tagline">Practical, classroom-ready help for teaching with AI — <strong>start with the work, grow the craft, keep children safe.</strong></p>
  <div class="rule"></div>
</body>
</html>
